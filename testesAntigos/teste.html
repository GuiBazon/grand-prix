<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAP — Inteligência de Acessibilidade Petrobras</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pb-blue:#003DA5;--pb-blue-d:#00297a;--pb-blue-l:#e6edf8;
      --pb-green:#009640;--pb-green-d:#006e2e;--pb-green-l:#e6f5ec;
      --pb-yellow:#FFD100;--pb-yellow-d:#b39200;--pb-yellow-l:#fffbe6;
      --bg:#f4f6fa;--surface:#fff;--surface2:#f0f3f8;
      --text:#0d1a2e;--text2:#3a4a60;--text3:#6b7c96;
      --border:#d0d9e8;--border2:#b0bdd0;
      --acc-green:#009640;--acc-red:#c0392b;--acc-warn:#e67e00;
      --font-scale:1;--sidebar-w:220px;
      --focus-ring: 3px solid #ffcc00;
    }
    [data-theme="dark"]{
      --bg:#0a0f1a;--surface:#111827;--surface2:#1a2333;
      --text:#e8eef8;--text2:#a0b0c8;--text3:#6080a0;
      --border:#2a3a50;--border2:#3a4a60;
      --pb-blue-l:#0a1a3a;--pb-green-l:#0a1f14;
    }
    [data-contrast="high"]{
      --bg:#000;--surface:#000;--surface2:#111;
      --text:#fff;--text2:#ffe000;--text3:#aaa;
      --border:#fff;--border2:#ffe000;
      --pb-blue:#4da6ff;--pb-blue-l:#001833;
      --pb-green:#00ff88;--pb-green-l:#001a0a;
      --pb-yellow:#ffe000;
    }
    [data-reduce-motion="true"] *{animation:none!important;transition:none!important}
    @media (prefers-reduced-motion: reduce) {
      [data-reduce-motion="auto"] *{animation:none!important;transition:none!important}
    }
    body{font-family:system-ui,sans-serif;font-size:calc(14px * var(--font-scale));background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    #app{background:var(--bg);width:100%;max-width:1100px;min-height:640px;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .topbar{height:52px;background:var(--pb-blue);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
    .logo-text{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.2px}
    .logo-badge{background:var(--pb-yellow);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
    .layout{display:flex;flex:1;min-height:0}
    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
    .content{flex:1;padding:20px;overflow-y:auto;background:var(--bg);outline:none}
    .content:focus-visible{box-shadow:inset 0 0 0 2px var(--pb-blue)}
    .user-card{padding:12px;border-bottom:1px solid var(--border)}
    .user-inner{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--surface2)}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--pb-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .avatar.green{background:var(--pb-green)}.avatar.yellow{background:var(--pb-yellow);color:#000}.avatar.dark{background:var(--pb-blue-d)}
    .uname{font-size:12px;font-weight:600;color:var(--text)}.urole{font-size:10px;color:var(--text3)}
    .nav-group{padding:8px 0 0}
    .nav-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:4px 14px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:12px;color:var(--text2);border-left:3px solid transparent;transition:all .15s;outline:none}
    .nav-item:hover,.nav-item:focus-visible{background:var(--surface2);color:var(--text)}
    .nav-item:focus-visible{outline:var(--focus-ring);outline-offset:-2px}
    .nav-item.active{background:var(--pb-blue-l);color:var(--pb-blue);border-left-color:var(--pb-blue);font-weight:600}
    [data-contrast="high"] .nav-item.active{background:#001833;color:var(--pb-blue);border-left-color:var(--pb-blue)}
    .nbadge{margin-left:auto;background:var(--acc-red);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700}
    .nav-sep{height:1px;background:var(--border);margin:6px 12px}
    .profile-tabs{display:flex;gap:4px;margin-left:auto}
    .ptab{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.8);font-weight:500;transition:all .15s}
    .ptab:hover,.ptab:focus-visible{background:rgba(255,255,255,.15);color:#fff;outline:var(--focus-ring)}
    .ptab.sel{background:var(--pb-yellow);color:#000;border-color:transparent;font-weight:700}
    .pg-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px}
    .pg-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
    .mlabel{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
    .mval{font-size:22px;font-weight:700;color:var(--text)}
    .msub{font-size:11px;color:var(--text3);margin-top:2px}
    .mval.green{color:var(--pb-green)}.mval.blue{color:var(--pb-blue)}.mval.red{color:var(--acc-red)}.mval.warn{color:var(--acc-warn)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
    .card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .card-title .accent{width:3px;height:14px;background:var(--pb-blue);border-radius:2px}
    .tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:12px;font-weight:700;letter-spacing:.2px}
    .t-ok{background:var(--pb-green-l);color:var(--pb-green-d)}.t-warn{background:#fff3e0;color:#a05000}.t-err{background:#fde8e8;color:var(--acc-red)}
    .t-info{background:var(--pb-blue-l);color:var(--pb-blue-d)}.t-gray{background:var(--surface2);color:var(--text3)}
    [data-contrast="high"] .t-ok{background:#002200;color:#00ff88}[data-contrast="high"] .t-warn{background:#2a1500;color:#ffe000}[data-contrast="high"] .t-err{background:#2a0000;color:#ff6060}[data-contrast="high"] .t-info{background:#001833;color:#4da6ff}[data-contrast="high"] .t-gray{background:#111;color:#aaa}
    .trow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .trow:last-child{border-bottom:none}
    .bar-bg{height:5px;background:var(--surface2);border-radius:3px;margin-top:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:var(--pb-blue);transition:width .4s}
    .alert-row{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:8px;margin-bottom:6px;border-left:3px solid}
    .a-crit{background:#fde8e8;border-color:var(--acc-red)}.a-warn{background:#fff3e0;border-color:var(--acc-warn)}.a-ok{background:var(--pb-green-l);border-color:var(--pb-green)}
    [data-contrast="high"] .a-crit{background:#1a0000}[data-contrast="high"] .a-warn{background:#1a0a00}[data-contrast="high"] .a-ok{background:#001a08}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .d-red{background:var(--acc-red)}.d-warn{background:var(--acc-warn)}.d-green{background:var(--pb-green)}
    .form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.3px}
    .form-input{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none}
    .form-input:focus{border-color:var(--pb-blue);box-shadow:0 0 0 2px var(--pb-blue-l)}
    .form-ta{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);min-height:80px;resize:vertical;outline:none}
    .form-ta:focus{border-color:var(--pb-blue)}
    .form-row{margin-bottom:14px}
    .btn-p{padding:9px 18px;font-size:13px;font-weight:700;background:var(--pb-blue);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s}
    .btn-p:hover{opacity:.88}.btn-p.green{background:var(--pb-green)}
    .btn-s{padding:8px 16px;font-size:13px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background .15s}
    .btn-s:hover{background:var(--surface2)}
    .chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-weight:500;transition:all .15s}
    .chip.sel{border-color:var(--pb-blue);background:var(--pb-blue-l);color:var(--pb-blue);font-weight:700}
    [data-contrast="high"] .chip.sel{background:#001833;color:var(--pb-blue)}
    .chip-row{display:flex;gap:6px;flex-wrap:wrap}
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .toggle-wrap:last-child{border-bottom:none}
    .tw-label{font-size:13px;font-weight:600;color:var(--text)}
    .tw-desc{font-size:11px;color:var(--text3);margin-top:1px}
    .toggle{position:relative;width:40px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .tslider{position:absolute;inset:0;background:var(--border2);border-radius:22px;cursor:pointer;transition:background .2s}
    .tslider:before{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
    .toggle input:checked+.tslider{background:var(--pb-blue)}
    .toggle input:checked+.tslider:before{transform:translateX(18px)}
    [data-contrast="high"] .toggle input:checked+.tslider{background:var(--pb-green)}
    .range-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .range-row input[type=range]{flex:1;accent-color:var(--pb-blue)}
    .range-val{font-size:13px;font-weight:700;color:var(--pb-blue);min-width:38px;text-align:right}
    .sensor-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .sensor-row:last-child{border-bottom:none}
    .toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);padding:9px 18px;background:var(--pb-blue);color:#fff;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:99}
    .toast.show{opacity:1}
    table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
    th{text-align:left;padding:7px 0;font-weight:700;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
    td{padding:9px 0;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .acc-section{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
    .upload-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;color:var(--text3);font-size:12px;transition:border-color .2s}
    .upload-zone:hover,.upload-zone:focus-visible{border-color:var(--pb-blue);color:var(--pb-blue);outline:var(--focus-ring)}
    .skip-link{position:absolute;top:-40px;left:0;background:var(--pb-blue);color:#fff;padding:8px 16px;z-index:1000;font-weight:700;border-radius:0 0 4px 0;transition:top .2s}
    .skip-link:focus{top:0}
    @media (max-width: 768px) {
      :root { --sidebar-w: 60px; }
      .nav-item span:nth-child(2), .uname, .urole { display: none; }
      .grid2, .grid4 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a href="#content" class="skip-link">Pular para o conteúdo principal</a>
  <div id="app" role="application">
    <div class="topbar" role="banner">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="14" fill="#FFD100"/><text x="14" y="19" text-anchor="middle" font-size="11" font-weight="900" fill="#003DA5">P</text></svg>
        <span class="logo-text">IAP</span><span class="logo-badge">PETROBRAS</span>
      </div>
      <div class="profile-tabs" id="ptabs" role="tablist" aria-label="Selecione o perfil">
        <button class="ptab sel" role="tab" aria-selected="true" onclick="switchProfile('funcionario',this)">Funcionário</button>
        <button class="ptab" role="tab" aria-selected="false" onclick="switchProfile('gestor',this)">Gestor</button>
        <button class="ptab" role="tab" aria-selected="false" onclick="switchProfile('rh',this)">RH</button>
        <button class="ptab" role="tab" aria-selected="false" onclick="switchProfile('admin',this)">Admin</button>
      </div>
      <div id="user-av" style="width:30px;height:30px;border-radius:50%;background:var(--pb-yellow);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;cursor:pointer;margin-left:8px" title="Perfil do usuário" aria-label="Avatar do usuário">MF</div>
    </div>
    <div class="layout">
      <nav class="sidebar" aria-label="Navegação principal" id="sidebar"></nav>
      <main class="content" id="content" role="main" tabindex="0" aria-live="polite"></main>
    </div>
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
  </div>

<script>
const P={
  funcionario:{name:"Maria Ferreira",initials:"MF",role:"Funcionária · Engenharia",avClass:"",
    nav:[{i:"⊙",l:"Início",p:"dash"},{i:"⊞",l:"Minhas demandas",p:"demandas",b:2},{i:"⊕",l:"Nova demanda",p:"nova"},{i:"⊗",l:"Recursos",p:"recursos"},{i:"⊛",l:"Acessibilidade",p:"acc"}]},
  gestor:{name:"Carlos Lima",initials:"CL",role:"Gestor · Operações",avClass:"green",
    nav:[{i:"⊙",l:"Painel do setor",p:"dash"},{i:"⊞",l:"Demandas",p:"demandas",b:5},{i:"⊟",l:"Alertas",p:"alertas",b:1},{i:"⊠",l:"Relatórios",p:"relatorios"},{i:"⊛",l:"Acessibilidade",p:"acc"}]},
  rh:{name:"Ana Paula",initials:"AP",role:"Analista · RH",avClass:"yellow",
    nav:[{i:"⊙",l:"Painel RH",p:"dash"},{i:"⊞",l:"Todas demandas",p:"demandas"},{i:"⊕",l:"Funcionários",p:"funcionarios"},{i:"⊠",l:"Relatórios",p:"relatorios"},{i:"⊛",l:"Acessibilidade",p:"acc"}]},
  admin:{name:"Roberto Souza",initials:"RS",role:"Administrador · TI",avClass:"dark",
    nav:[{i:"⊙",l:"Visão geral",p:"dash"},{i:"⊞",l:"Sensores",p:"sensores"},{i:"⊟",l:"Usuários",p:"usuarios"},{i:"⊕",l:"Auditoria",p:"auditoria"},{i:"⊛",l:"Acessibilidade",p:"acc"}]}
};

let cur="funcionario", page="dash";
let ACC={dark:false,contrast:false,font:100,narr:100,libras:false,motion:false};
let ttsEnabled = false;

// Carregar configurações salvas
(function initStorage(){
  try {
    const s = localStorage.getItem('iap_acc'); if(s) Object.assign(ACC, JSON.parse(s));
    const p = localStorage.getItem('iap_profile'); if(p && P[p]) cur = p;
    const h = window.location.hash.slice(1).split('/');
    if(h.length===2 && P[h[0]]) { cur=h[0]; page=h[1]||'dash'; }
  } catch(e){}
  applyAcc();
})();

function saveState(){
  try {
    localStorage.setItem('iap_acc', JSON.stringify(ACC));
    localStorage.setItem('iap_profile', cur);
    window.location.hash = `#${cur}/${page}`;
  } catch(e){}
}

function applyAcc(){
  const root=document.getElementById("app");
  root.setAttribute("data-theme", ACC.dark ? "dark" : "light");
  root.setAttribute("data-contrast", ACC.contrast ? "high" : "normal");
  root.setAttribute("data-reduce-motion", ACC.motion ? "true" : (window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'false'));
  document.documentElement.style.setProperty('--font-scale', ACC.font/100);
  ttsEnabled = !!document.querySelector('#tog-tts')?.checked;
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"), 2400);
}

function speak(text){
  if(!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.substring(0, 300));
  u.rate = ACC.narr / 100; u.lang = 'pt-BR';
  window.speechSynthesis.speak(u);
}

function switchProfile(p, btn){
  cur=p; page="dash";
  document.querySelectorAll(".ptab").forEach(b=>{b.classList.remove("sel");b.setAttribute("aria-selected","false")});
  btn.classList.add("sel"); btn.setAttribute("aria-selected","true");
  document.getElementById("user-av").textContent = P[p].initials;
  renderSidebar(); renderContent(); saveState();
  speak(`Perfil ${P[p].name} ativado`);
}

function go(pg){ page=pg; renderSidebar(); renderContent(); saveState(); }

function renderSidebar(){
  const prof=P[cur];
  document.getElementById("sidebar").innerHTML=`
    <div class="user-card">
      <div class="user-inner">
        <div class="avatar ${prof.avClass}">${prof.initials}</div>
        <div><div class="uname">${prof.name}</div><div class="urole">${prof.role}</div></div>
      </div>
    </div>
    <div class="nav-group">
      ${prof.nav.map(n=>`
        <div class="nav-item${page===n.p?" active":""}" onclick="go('${n.p}')" role="menuitem" tabindex="0" aria-current="${page===n.p?'page':'false'}">
          <span aria-hidden="true" style="font-size:15px">${n.i}</span>
          <span style="flex:1">${n.l}</span>
          ${n.b?`<span class="nbadge" aria-label="${n.b} pendentes">${n.b}</span>`:""}
        </div>`).join("")}
    </div>
    <div style="margin-top:auto;padding:8px 0">
      <div class="nav-sep"></div>
      <div class="nav-item" onclick="toast('Sessão encerrada')" tabindex="0" role="menuitem">
        <span aria-hidden="true" style="font-size:14px">↩</span><span>Sair</span>
      </div>
    </div>`;
  enableKeyboardNav('.nav-item');
}

function renderContent(){
  const fns={dash:rDash,demandas:rDemandas,nova:rNova,recursos:rRecursos,acc:rAcc,alertas:rAlertas,relatorios:rRelatorios,funcionarios:rFuncionarios,sensores:rSensores,usuarios:rUsuarios,auditoria:rAuditoria};
  const el = document.getElementById("content");
  el.innerHTML = (fns[page] || rDash)();
  el.scrollTop = 0; el.focus();
  initPage(); enableKeyboardNav('.nav-item, .chip, .upload-zone, .btn-p, .btn-s');
  const title = el.querySelector('.pg-title')?.textContent || 'IAP Petrobras';
  document.title = title;
  speak(title);
}

function initPage(){
  if(page==="acc"){
    setTog("tog-dark", ACC.dark);
    setTog("tog-contrast", ACC.contrast);
    setTog("tog-libras", ACC.libras);
    setTog("tog-motion", ACC.motion);
    setTog("tog-tts", ttsEnabled);
    setRange("rng-font", ACC.font, "val-font-label", "%");
    setRange("rng-font-range", ACC.font, "val-font-range", "%");
    setRange("rng-narr", ACC.narr, "val-narr-label", "%");
    setRange("rng-narr-range", ACC.narr, "val-narr-range", "%");
  }
}

function setTog(id, val){ const el=document.getElementById(id); if(el) el.checked=val; }
function setRange(id, val, vid, suf){
  const el=document.getElementById(id), vl=document.getElementById(vid);
  if(el) el.value=val; if(vl) vl.textContent=val+suf;
}

function enableKeyboardNav(selector){
  document.querySelectorAll(selector).forEach(el => {
    el.addEventListener('keydown', e => {
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); el.click(); }
    });
    el.addEventListener('focus', e => e.target.classList.add('focused'));
    el.addEventListener('blur', e => e.target.classList.remove('focused'));
  });
}

function rDash(){
  if(cur==="funcionario") return `
    <div class="pg-title">Bom dia, Maria</div>
    <div class="pg-sub">Você tem 2 demandas em andamento · ${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
    <div class="grid4">
      <div class="metric"><div class="mlabel">Demandas abertas</div><div class="mval blue">2</div><div class="msub">1 aguardando resposta</div></div>
      <div class="metric"><div class="mlabel">Resolvidas (30d)</div><div class="mval green">7</div><div class="msub">Dentro do prazo</div></div>
      <div class="metric"><div class="mlabel">Tempo médio</div><div class="mval">3,2d</div><div class="msub">De resolução</div></div>
      <div class="metric"><div class="mlabel">Recursos ativos</div><div class="mval">4</div><div class="msub">Disponíveis</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title"><span class="accent"></span>Últimas demandas</div>
