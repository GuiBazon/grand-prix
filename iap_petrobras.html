<script>
  const P = {
    funcionario: {
      name: "Maria Ferreira",
      initials: "MF",
      role: "Funcionária · Engenharia",
      avClass: "",
      nav: [
        { i: "⊙", l: "Início", p: "dash" },
        { i: "⊞", l: "Minhas demandas", p: "demandas", b: 2 },
        { i: "⊕", l: "Nova demanda", p: "nova" },
        { i: "⊗", l: "Recursos", p: "recursos" },
        { i: "⊛", l: "Acessibilidade", p: "acc" },
      ],
    },
    gestor: {
      name: "Carlos Lima",
      initials: "CL",
      role: "Gestor · Operações",
      avClass: "green",
      nav: [
        { i: "⊙", l: "Painel do setor", p: "dash" },
        { i: "⊞", l: "Demandas", p: "demandas", b: 5 },
        { i: "⊟", l: "Alertas", p: "alertas", b: 1 },
        { i: "⊠", l: "Relatórios", p: "relatorios" },
        { i: "⊛", l: "Acessibilidade", p: "acc" },
      ],
    },
    rh: {
      name: "Ana Paula",
      initials: "AP",
      role: "Analista · RH",
      avClass: "yellow",
      nav: [
        { i: "⊙", l: "Painel RH", p: "dash" },
        { i: "⊞", l: "Todas demandas", p: "demandas" },
        { i: "⊕", l: "Funcionários", p: "funcionarios" },
        { i: "⊠", l: "Relatórios", p: "relatorios" },
        { i: "⊛", l: "Acessibilidade", p: "acc" },
      ],
    },
    admin: {
      name: "Roberto Souza",
      initials: "RS",
      role: "Administrador · TI",
      avClass: "dark",
      nav: [
        { i: "⊙", l: "Visão geral", p: "dash" },
        { i: "⊞", l: "Sensores", p: "sensores" },
        { i: "⊟", l: "Usuários", p: "usuarios" },
        { i: "⊕", l: "Auditoria", p: "auditoria" },
        { i: "⊛", l: "Acessibilidade", p: "acc" },
      ],
    },
  };

  let cur = "funcionario",
    page = "dash";
  let ACC = {
    dark: false,
    contrast: false,
    font: 100,
    narr: 100,
    libras: false,
    motion: false,
  };

  function applyAcc() {
    const root = document.getElementById("app");
    root.setAttribute("data-theme", ACC.dark ? "dark" : "light");
    root.setAttribute("data-contrast", ACC.contrast ? "high" : "normal");
    root.setAttribute("data-reduce-motion", ACC.motion ? "true" : "false");
    document.body.style.fontSize = ACC.font + "%";
    const fs = ACC.font / 100;
    root.style.setProperty("--font-scale", fs);
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove("show"), 2400);
  }

  function switchProfile(p, btn) {
    cur = p;
    page = "dash";
    document.querySelectorAll(".ptab").forEach((b) => {
      b.classList.remove("sel");
      b.setAttribute("aria-selected", "false");
    });
    btn.classList.add("sel");
    btn.setAttribute("aria-selected", "true");
    const av = document.getElementById("user-av");
    av.textContent = P[p].initials;
    renderSidebar();
    renderContent();
  }

  function go(pg) {
    page = pg;
    renderSidebar();
    renderContent();
  }

    const prof = P[cur];

    document.getElementById("content").innerHTML = (fns[page] || rDash)();

  function initPage() {
    if (page === "acc") {
      const s = ACC;
      setTog("tog-dark", s.dark);
      setTog("tog-contrast", s.contrast);
      setTog("tog-libras", s.libras);
      setTog("tog-motion", s.motion);
      setRange("rng-font", s.font, "val-font", "%");
      setRange("rng-narr", s.narr, "val-narr", "%");
    }
  }
  function setTog(id, val) {
    const el = document.getElementById(id);
    if (el) el.checked = val;
  }
  function setRange(id, val, vid, suf) {
    const el = document.getElementById(id),
      vl = document.getElementById(vid);
    if (el) el.value = val;
    if (vl) vl.textContent = val + suf;
