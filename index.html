<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAP — Inteligência de Acessibilidade Petrobras</title>

  <!-- ═══════════════════════════════════════════════════════
       Para trocar o tema (ex: SENAI), edite apenas:
         1. css/theme.css  — cores e variáveis de marca
         2. js/config.js   — nome, perfis e dados iniciais
       ═══════════════════════════════════════════════════════ -->

  <!-- CSS: ordem importa (theme → base → components → responsive) -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ── Banner de narração ativa ── -->
  <div id="narr-banner" role="alert" aria-live="polite">
    <span aria-hidden="true">🔊</span>
    <span id="narr-text">Narração ativa — lendo conteúdo</span>
    <button onclick="Accessibility.stop()">Parar</button>
  </div>

  <!-- ── Topbar ── -->
  <header id="topbar" role="banner">
    <button id="menu-btn" onclick="UI.toggleSidebar()" aria-label="Abrir menu" aria-expanded="false">☰</button>

    <div class="logo-wrap">
      <div class="logo-icon" id="logo-icon">P</div>
      <div>
        <div class="logo-text" id="logo-text">IAP · Petrobras</div>
        <div class="logo-sub"  id="logo-sub">Inteligência de Acessibilidade</div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Seletor de perfil (demo) -->
    <nav class="ptabs" aria-label="Selecionar perfil">
      <button class="ptab active" onclick="State.setProfile('funcionario'); this.closest('.ptabs').querySelectorAll('.ptab').forEach(b=>b.classList.remove('active')); this.classList.add('active')">Funcionário</button>
      <button class="ptab"        onclick="State.setProfile('gestor');      this.closest('.ptabs').querySelectorAll('.ptab').forEach(b=>b.classList.remove('active')); this.classList.add('active')">Gestor</button>
      <button class="ptab"        onclick="State.setProfile('rh');          this.closest('.ptabs').querySelectorAll('.ptab').forEach(b=>b.classList.remove('active')); this.classList.add('active')">RH</button>
      <button class="ptab"        onclick="State.setProfile('admin');       this.closest('.ptabs').querySelectorAll('.ptab').forEach(b=>b.classList.remove('active')); this.classList.add('active')">Admin</button>
    </nav>

    <div class="topbar-user" id="topbar-av" title="Perfil do usuário" aria-label="Avatar do usuário">MF</div>
  </header>

  <!-- ── Layout ── -->
  <div id="layout">
    <nav id="sidebar" aria-label="Menu principal"></nav>
    <main id="content" aria-live="polite" tabindex="-1"></main>
  </div>

  <!-- ── Overlay mobile ── -->
  <div id="sidebar-overlay" onclick="UI.toggleSidebar()" aria-hidden="true"></div>

  <!-- ── Widget LIBRAS ── -->
  <aside id="libras-widget" role="complementary" aria-label="Intérprete de LIBRAS">
    <div class="libras-header">
      <span>🤟 LIBRAS</span>
      <button onclick="State.setAcc('libras', false)" aria-label="Fechar LIBRAS">✕</button>
    </div>
    <div class="libras-screen" aria-hidden="true">
      <div class="libras-avatar">🧑‍💼</div>
      <div class="libras-sub">Interpretando em LIBRAS...</div>
    </div>
    <div class="libras-caption" id="libras-caption">Aguardando leitura de tela</div>
  </aside>

  <!-- ── Toast ── -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════════════
       JS: ordem de carregamento importa
       config → state → accessibility → ui → router
       → pages/* → app (inicializa por último)
       ═══════════════════════════════════════════════ -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/router.js"></script>

  <!-- Páginas (ordem não importa) -->
  <script src="js/pages/dash.js"></script>
  <script src="js/pages/demandas.js"></script>
  <script src="js/pages/nova.js"></script>
  <script src="js/pages/outros.js"></script>

  <!-- Inicialização (sempre por último) -->
  <script src="js/app.js"></script>

</body>
</html>
